# 🛰️ Kessler Rules Engine Configuration
#
# This file dictates what is safe to delete, what requires a deep clean,
# and what is an absolute "Danger Zone" that should never be touched.
#
# Tiers:
# - safe:   100% regeneratable caches and package folders (Default clean)
# - deep:   Compiled binaries, final outputs, and heavy regeneratable state (--deep flag required)
# - danger: HARD BLOCK. Never delete these, even if user asks.

rules:
  # ---------------------------------------------------------
  # JAVASCRIPT / TYPESCRIPT (Node, Deno, Bun)
  # ---------------------------------------------------------
  - name: "Node.js / JS Ecosystem"
    triggers: ["package.json", "deno.json", "bunfig.toml"]
    targets:
      # Safe to Nuke
      - path: "node_modules"
        tier: "safe"
      - path: "bower_components"
        tier: "safe"
      - path: ".yarn/cache"
        tier: "safe"
      - path: ".pnp.cjs"
        tier: "safe"
      - path: ".next"
        tier: "safe"
      - path: ".nuxt"
        tier: "safe"
      - path: ".svelte-kit"
        tier: "safe"
      - path: ".turbo"
        tier: "safe"
      - path: ".parcel-cache"
        tier: "safe"
      - path: ".angular/cache"
        tier: "safe"
      - path: ".eslintcache"
        tier: "safe"
      - path: "tsconfig.tsbuildinfo"
        tier: "safe"
      - path: "coverage"
        tier: "safe"
      - path: ".nyc_output"
        tier: "safe"
      
      # Deep Clean (Builds)
      - path: "dist"
        tier: "deep"
      - path: "build"
        tier: "deep"
      - path: "out"
        tier: "deep"

  # ---------------------------------------------------------
  # PYTHON
  # ---------------------------------------------------------
  - name: "Python"
    triggers: ["requirements.txt", "pyproject.toml", "setup.py", "Pipfile", "uv.lock"]
    targets:
      # Safe to Nuke
      - path: "__pycache__"
        tier: "safe"
      - path: "venv"
        tier: "safe"
      - path: ".venv"
        tier: "safe"
      - path: "env"
        tier: "safe"
      - path: ".pytest_cache"
        tier: "safe"
      - path: ".ruff_cache"
        tier: "safe"
      - path: ".mypy_cache"
        tier: "safe"
      - path: ".coverage"
        tier: "safe"
      - path: "htmlcov"
        tier: "safe"
      
      # Deep Clean (Data Science / Builds)
      - path: "build"
        tier: "deep"
      - path: "dist"
        tier: "deep"
      - path: ".ipynb_checkpoints"
        tier: "deep"
      - path: "wandb"
        tier: "deep"
      - path: "mlruns"
        tier: "deep"
      - path: "tensorboard"
        tier: "deep"

  # ---------------------------------------------------------
  # RUST
  # ---------------------------------------------------------
  - name: "Rust"
    triggers: ["Cargo.toml"]
    targets:
      - path: "target"
        tier: "safe"

  # ---------------------------------------------------------
  # GOLANG
  # ---------------------------------------------------------
  - name: "Go"
    triggers: ["go.mod"]
    targets:
      - path: "vendor"
        tier: "safe"
      - path: "bin"
        tier: "deep"
      - path: "dist"
        tier: "deep"
      - path: "build"
        tier: "deep"
      - path: "*.test"
        tier: "deep"
      - path: "coverage.out"
        tier: "safe"
      - path: "coverage.txt"
        tier: "safe"
      - path: "cover.out"
        tier: "safe"
      - path: "c.out"
        tier: "safe"
      - path: ".gocache"
        tier: "safe"

  # ---------------------------------------------------------
  # JAVA / JVM
  # ---------------------------------------------------------
  - name: "Java / JVM"
    triggers: ["pom.xml", "build.gradle", "build.gradle.kts"]
    targets:
      - path: "target"
        tier: "safe"
      - path: "build"
        tier: "safe"
      - path: ".gradle"
        tier: "safe"

  # ---------------------------------------------------------
  # PHP
  # ---------------------------------------------------------
  - name: "PHP"
    triggers: ["composer.json"]
    targets:
      - path: "vendor"
        tier: "safe"

  # ---------------------------------------------------------
  # RUBY
  # ---------------------------------------------------------
  - name: "Ruby"
    triggers: ["Gemfile"]
    targets:
      - path: "vendor/bundle"
        tier: "safe"
      - path: ".bundle"
        tier: "safe"

  # ---------------------------------------------------------
  # C# / .NET
  # ---------------------------------------------------------
  - name: ".NET / C#"
    triggers: ["*.csproj", "*.sln"]
    targets:
      - path: "bin"
        tier: "deep"
      - path: "obj"
        tier: "safe"
      - path: "packages"
        tier: "safe"

  # ---------------------------------------------------------
  # ELIXIR
  # ---------------------------------------------------------
  - name: "Elixir"
    triggers: ["mix.exs"]
    targets:
      - path: "deps"
        tier: "safe"
      - path: "_build"
        tier: "safe"

  # ---------------------------------------------------------
  # INFRASTRUCTURE AS CODE (IaC)
  # ---------------------------------------------------------
  - name: "Terraform / IaC"
    triggers: ["*.tf", "cdk.json", "serverless.yml"]
    targets:
      - path: ".terraform"
        tier: "safe"
      - path: "cdk.out"
        tier: "safe"
      - path: ".serverless"
        tier: "safe"

  # ---------------------------------------------------------
  # SWIFT / iOS
  # ---------------------------------------------------------
  - name: "Swift / iOS"
    triggers: ["Package.swift", "*.xcodeproj", "*.xcworkspace"]
    targets:
      - path: ".build"
        tier: "safe"
      - path: "DerivedData"
        tier: "deep"
      - path: "build"
        tier: "safe"
      - path: "Pods"
        tier: "safe"

  # ---------------------------------------------------------
  # UNREAL ENGINE
  # ---------------------------------------------------------
  - name: "Unreal Engine"
    triggers: ["*.uproject"]
    targets:
      - path: "Binaries"
        tier: "deep"
      - path: "Build"
        tier: "deep"
      - path: "Intermediate"
        tier: "safe"
      - path: "Saved"
        tier: "safe"
      - path: "DerivedDataCache"
        tier: "safe"

  # ---------------------------------------------------------
  # GODOT
  # ---------------------------------------------------------
  - name: "Godot"
    triggers: ["project.godot"]
    targets:
      - path: ".godot"
        tier: "safe"

  # ---------------------------------------------------------
  # ANDROID
  # ---------------------------------------------------------
  - name: "Android"
    triggers: ["build.gradle", "build.gradle.kts", "settings.gradle", "settings.gradle.kts"]
    targets:
      - path: ".gradle"
        tier: "safe"
      - path: "build"
        tier: "safe"
      - path: ".cxx"
        tier: "safe"

  # ---------------------------------------------------------
  # R
  # ---------------------------------------------------------
  - name: "R"
    triggers: ["*.Rproj", "DESCRIPTION"]
    targets:
      - path: ".Rproj.user"
        tier: "safe"
      - path: ".Rhistory"
        tier: "safe"
      - path: ".RData"
        tier: "safe"

  # ---------------------------------------------------------
  # LATEX
  # ---------------------------------------------------------
  - name: "LaTeX"
    triggers: ["*.tex"]
    targets:
      - path: "*.aux"
        tier: "safe"
      - path: "*.log"
        tier: "safe"
      - path: "*.out"
        tier: "safe"
      - path: "*.toc"
        tier: "safe"
      - path: "*.fls"
        tier: "safe"
      - path: "*.fdb_latexmk"
        tier: "safe"
      - path: "*.synctex.gz"
        tier: "safe"
      - path: "*.bbl"
        tier: "safe"
      - path: "*.blg"
        tier: "safe"
      - path: "*.xdv"
        tier: "safe"

  # ---------------------------------------------------------
  # SCALA
  # ---------------------------------------------------------
  - name: "Scala"
    triggers: ["build.sbt"]
    targets:
      - path: "target"
        tier: "safe"
      - path: "project/target"
        tier: "safe"
      - path: "project/project"
        tier: "safe"
      - path: ".bsp"
        tier: "safe"
      - path: ".metals"
        tier: "safe"

  # ---------------------------------------------------------
  # HASKELL
  # ---------------------------------------------------------
  - name: "Haskell"
    triggers: ["*.cabal", "package.yaml", "stack.yaml"]
    targets:
      - path: "dist"
        tier: "deep"
      - path: "dist-newstyle"
        tier: "safe"
      - path: ".stack-work"
        tier: "safe"

  # ---------------------------------------------------------
  # ZIG
  # ---------------------------------------------------------
  - name: "Zig"
    triggers: ["build.zig"]
    targets:
      - path: "zig-cache"
        tier: "safe"
      - path: "zig-out"
        tier: "safe"

  # ---------------------------------------------------------
  # FLUTTER
  # ---------------------------------------------------------
  - name: "Flutter"
    triggers: ["pubspec.yaml"]
    targets:
      - path: "build"
        tier: "safe"
      - path: ".dart_tool"
        tier: "safe"
      - path: ".pub-cache"
        tier: "safe"

  # ---------------------------------------------------------
  # C / C++
  # ---------------------------------------------------------
  - name: "C / C++"
    triggers: ["CMakeLists.txt", "Makefile", "*.vcxproj"]
    targets:
      - path: "build"
        tier: "safe"
      - path: "out"
        tier: "safe"
      - path: "bin"
        tier: "deep"
      - path: "obj"
        tier: "safe"
      - path: ".cache"
        tier: "safe"

  # ---------------------------------------------------------
  # GLOBAL OS / EDITOR JUNK (Always applies)
  # ---------------------------------------------------------
  - name: "OS & Editor Caches"
    triggers: [] # Empty array means this applies everywhere globally
    targets:
      - path: ".DS_Store"
        tier: "safe"
      - path: "__MACOSX"
        tier: "safe"
      - path: "Thumbs.db"
        tier: "safe"
      - path: "desktop.ini"
        tier: "safe"
      - path: "crashreports"
        tier: "safe"
      - path: ".idea"
        tier: "deep"
      - path: ".vscode"
        tier: "deep"

# ---------------------------------------------------------
# GLOBAL DANGER ZONE
# (Hardcoded fallbacks - if a user adds these to a rule
# by mistake, the engine should STILL reject deletion).
# ---------------------------------------------------------
danger_zone:
  - ".env"
  - ".env.local"
  - ".env.development"
  - ".env.production"
  - "package-lock.json"
  - "yarn.lock"
  - "pnpm-lock.yaml"
  - "bun.lockb"
  - "Cargo.lock"
  - "poetry.lock"
  - "Pipfile.lock"
  - "uv.lock"
  - "Gemfile.lock"
  - "composer.lock"
  - "mix.lock"
  - ".git"

# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: kessler

before:
  hooks:
    - go mod tidy

builds:
  - id: kessler
    main: .
    binary: kessler
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.ShortCommit}}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

# DEB packages for Debian/Ubuntu
nfpms:
  - id: deb
    package_name: kessler
    vendor: hariharen9
    homepage: https://github.com/hariharen9/kessler
    maintainer: hariharen
    description: "🛰️ Intelligent CLI tool to find and safely clean build artifacts & caches"
    license: MIT
    formats:
      - deb
    bindir: /usr/local/bin

# Homebrew tap
brews:
  - name: kessler
    repository:
      owner: hariharen9
      name: homebrew-tap
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/hariharen9/kessler
    description: "🛰️ Intelligent CLI tool to find and safely clean build artifacts & caches"
    license: MIT
    install: |
      bin.install "kessler"
    test: |
      system "#{bin}/kessler", "--help"

# Scoop bucket (Windows)
scoops:
  - name: kessler
    repository:
      owner: hariharen9
      name: scoop-bucket
      token: "{{ .Env.GITHUB_TOKEN }}"
    homepage: https://github.com/hariharen9/kessler
    description: "🛰️ Intelligent CLI tool to find and safely clean build artifacts & caches"
    license: MIT

release:
  github:
    owner: hariharen9
    name: kessler
  name_template: "v{{.Version}}"
  draft: false
  prerelease: auto
